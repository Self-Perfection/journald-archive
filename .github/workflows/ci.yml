name: CI

# Build the .deb and run lintian on every push to main and every PR, so a
# broken build or a new lintian regression is caught before release time.
# Note: this does NOT functionally test the package — that needs systemd as
# PID 1 plus loop devices and is done manually in a VM.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            build-essential debhelper dpkg-dev fakeroot lintian

      - name: Build package
        run: make -C packaging/deb build

      - name: Lint package
        run: make -C packaging/deb lint

      - name: Upload built package
        uses: actions/upload-artifact@v7
        with:
          name: journald-archive-deb
          path: packaging/deb/dist/*.deb
          if-no-files-found: error
